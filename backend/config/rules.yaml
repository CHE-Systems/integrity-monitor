metadata:
  description: "Runtime + schedule config for data integrity monitoring"
  generated: "2025-12-30"
  note: "Core tables configured: students, parents, contractors, absent"

run_config:
  nightly_cron: "0 2 * * *"
  weekly_cron: "0 3 * * 0"
  alert_thresholds:
    max_run_minutes: 15
    duplicate_warning_count: 500

airtable:
  students:
    base_env: "AT_STUDENTS_BASE"
    table_env: "AT_STUDENTS_TABLE"
  parents:
    base_env: "AT_PARENTS_BASE"
    table_env: "AT_PARENTS_TABLE"
  contractors:
    base_env: "AT_CONTRACTORS_BASE"
    table_env: "AT_CONTRACTORS_TABLE"
  absent:
    base_env: "AT_ABSENT_BASE"
    table_env: "AT_ABSENT_TABLE"
  student_truth:
    base_env: "AT_STUDENT_TRUTH_BASE"
    table_env: "AT_STUDENT_TRUTH_TABLE"
  classes:
    base_env: "AT_CLASSES_BASE"
    table_env: "AT_CLASSES_TABLE"

firestore:
  runs_collection: "integrity_runs"
  metrics_collection: "integrity_metrics_daily"
  issues_collection: "integrity_issues"
  config_document: "integrity_config/current"

attendance_rules:
  onboarding_grace_days: 7
  limited_schedule_threshold: 3
  thresholds: {}

school_year:
  # Cache configuration
  cache_ttl_hours: 24

  # Transition period: Feb 1 - Aug 5 (both current and upcoming years active)
  # Outside transition: Aug 6 - Jan 31 (only current year active)
  transition_start_month: 2
  transition_start_day: 1
  transition_end_month: 8
  transition_end_day: 5

  # Field name mapping per entity
  # filter_type: 'exact' for direct equality, 'contains' for lookup/concatenated fields
  field_mappings:
    students:
      field_name: "School Year Text"
      filter_type: "exact"
    parents:
      field_name: "School Year (from Student) text"
      filter_type: "contains"
    contractors:
      field_name: "School Year (from Micro-Campus Data) text"
      filter_type: "contains"
    absent:
      field_name: "School Year (from Truth) (from Student) text"
      filter_type: "contains"
    student_truth:
      field_name: "School Year"
      filter_type: "exact"
    classes:
      field_name: "School Year text"
      filter_type: "exact"
