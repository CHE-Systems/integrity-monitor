metadata:
  description: "Runtime + schedule config for data integrity monitoring"
  generated: "2025-12-30"
  note: "Core tables configured: students, parents, contractors, absent"

run_config:
  nightly_cron: "0 2 * * *"
  weekly_cron: "0 3 * * 0"
  alert_thresholds:
    max_run_minutes: 15
    duplicate_warning_count: 500

airtable:
  students:
    base_env: "AT_STUDENTS_BASE"
    table_env: "AT_STUDENTS_TABLE"
  parents:
    base_env: "AT_PARENTS_BASE"
    table_env: "AT_PARENTS_TABLE"
  contractors:
    base_env: "AT_CONTRACTORS_BASE"
    table_env: "AT_CONTRACTORS_TABLE"
  absent:
    base_env: "AT_ABSENT_BASE"
    table_env: "AT_ABSENT_TABLE"
  student_truth:
    base_env: "AT_STUDENT_TRUTH_BASE"
    table_env: "AT_STUDENT_TRUTH_TABLE"
  classes:
    base_env: "AT_CLASSES_BASE"
    table_env: "AT_CLASSES_TABLE"

firestore:
  runs_collection: "integrity_runs"
  metrics_collection: "integrity_metrics_daily"
  issues_collection: "integrity_issues"
  config_document: "integrity_config/current"

attendance_rules:
  onboarding_grace_days: 7
  limited_schedule_threshold: 3
  thresholds: {}

school_year:
  # Cache configuration
  cache_ttl_hours: 24

  # Always includes current + 3 future years
  # Year transitions handled externally by toolkit API (CURRENT_SCHOOL_YEAR secret)
  # Example: If current is "2025-2026", active years are ["2025-2026", "2026-2027", "2027-2028", "2028-2029"]

  # Field name mapping per entity
  # filter_type options:
  #   - 'exact': Direct equality (must match year exactly)
  #   - 'exact_or_empty': Matches year OR blank/empty field
  #   - 'contains': Substring search in concatenated field
  #   - 'contains_or_empty': Substring search OR blank/empty field
  field_mappings:
    students:
      field_name: "School Year Text"
      filter_type: "contains_or_empty"
      # Students can have multiple years comma-separated (e.g., "2023-2024, 2024-2025, 2025-2026")
      # Include students with empty years for validation

    parents:
      field_name: "School Year (from Student) text"
      filter_type: "contains_or_empty"
      # Include parents with no students (for missing student rule validation)

    contractors:
      field_name: "School Year (from Micro-Campus Data) text"
      filter_type: "contains_or_empty"
      # Include contractors with no campus (for missing campus rule validation)

    absent:
      field_name: "School Year (from Truth) (from Student) text"
      filter_type: "contains_or_empty"
      # Include attendance records with no student link (for validation)

    student_truth:
      field_name: "School Year"
      filter_type: "contains_or_empty"
      # Student truth can have multiple years or empty values
      # Include all for validation

    classes:
      field_name: "School Year text"
      filter_type: "contains_or_empty"
      # Include classes with no students (for missing student rule validation)
