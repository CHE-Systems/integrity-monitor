metadata:
  source: docs/prompt-1-schema-spec.md
  generated: "2025-11-19"
  note: "Configured for contractors, students, and parents entities"

entities:
  students:
    description: Primary Student record tracking enrollment and relationships.
    key_identifiers:
      - student_id
      - truth_id
      - student_code
    identity_fields:
      - legal_first_name
      - legal_middle_name
      - legal_last_name
      - preferred_name
      - date_of_birth
      - primary_email
      - primary_phone
    relationships:
      parents:
        target: parents
        min_links: 1
        require_active: true
        message: "Students need at least one active parent/guardian."
      campus:
        target: campuses
        min_links: 1
        max_links: 1
        require_active: true
        message: "Active students must have exactly one primary campus."
      classes:
        target: classes
        min_links: 1
        condition_field: enrollment_status
        condition_value: enrolled
        message: "Enrolled students must be linked to at least one class."
      truth:
        target: truth
        min_links: 1
        require_active: true
        message: "Students require a Truth record link."
      payments:
        target: payments
        condition_field: tuition_required
        condition_value: "true"
        message: "Tuition students must link to a payment record."
    missing_key_data: []
  parents:
    description: Parent/guardian contacts linked to students for communication.
    key_identifiers:
      - parent_id
      - contact_email
      - contact_phone
    identity_fields:
      - full_name
      - contact_email
      - contact_phone
      - mailing_address
    relationships:
      students:
        target: students
        min_links: 1
        require_active: true
        message: "Active parents must link to at least one student."
    missing_key_data: []
  contractors:
    description: Contractors and instructors who teach classes.
    key_identifiers:
      - contractor_id
      - email
      - phone
      - ein
    identity_fields:
      - legal_name
      - preferred_name
      - email
      - phone
    relationships: {}
    missing_key_data:
      - field: flddCJDACjAsP1ltS
        rule_id: "required_field.contractors.email"
        severity: warning
        message: "Email is required."
      - field: fldWBnA5Xf6eQATOi
        rule_id: "required_field.contractors.cell_phone"
        severity: warning
        message: "Cell phone is required."
      - field: fldvkUuMlXw8vBvNQ
        rule_id: "required_field.contractors.contractor_vol"
        severity: warning
        message: "Contractor/Vol role type is required."

duplicates:
  contractors:
    likely:
      - rule_id: dup.contractor.email_phone
        description: Email or phone matches plus name similarity.
        conditions:
          - type: exact_match
            field: email
          - type: similarity
            field: legal_name
            similarity: 0.92
    possible: []
