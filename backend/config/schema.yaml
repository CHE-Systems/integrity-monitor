duplicates:
  students:
    likely:
      - rule_id: dup.students.dob_name
        description: Exact DOB match plus 80%+ name similarity.
        conditions:
          - type: exact_match
            field: fldya31Cb8IADmmkp
          - type: similarity
            field: fldJtWBqZzfyiEFJl
            similarity: 0.80
    possible: []
  parents:
    likely:
      - rule_id: dup.parents.email_name
        description: Exact email match plus 80%+ name similarity.
        conditions:
          - type: exact_match
            field: fld04xn6QzH3sBqGC
          - type: similarity
            field: fldaSvOZOctraCWuB
            similarity: 0.80
    possible: []
  contractors:
    likely:
      - rule_id: dup.contractor.email_phone
        description: Email or phone matches plus name similarity.
        conditions:
          - type: exact_match
            field: email
          - type: similarity
            field: legal_name
            similarity: 0.92
    possible: []
