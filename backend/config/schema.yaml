metadata:
  source: docs/prompt-1-schema-spec.md
  generated: "2025-11-19"
  note: "Configured for contractors, students, and parents entities"

entities:
  students:
    description: Primary Student record tracking enrollment and relationships.
    table_id: tblFBuVmDQ8TRKbLY
    key_identifiers:
      - student_id
      - truth_id
      - student_code
    identity_fields:
      - legal_first_name
      - legal_middle_name
      - legal_last_name
      - preferred_name
      - date_of_birth
      - primary_email
      - primary_phone
    relationships:
      parents:
        target: parents
        min_links: 1
        require_active: true
        message: "Students need at least one active parent/guardian."
      campus:
        target: campuses
        min_links: 1
        max_links: 1
        require_active: true
        message: "Active students must have exactly one primary campus."
      classes:
        target: classes
        min_links: 1
        condition_field: enrollment_status
        condition_value: enrolled
        message: "Enrolled students must be linked to at least one class."
      truth:
        target: truth
        min_links: 1
        require_active: true
        message: "Students require a Truth record link."
      payments:
        target: payments
        condition_field: tuition_required
        condition_value: "true"
        message: "Tuition students must link to a payment record."
    missing_key_data:
      - field: fldVGRpEqAyKv0o0g
        rule_id: "required_field.students.first_name"
        severity: warning
        message: "First name is required."
      - field: fldYFqpLyiA5FXwpO
        rule_id: "required_field.students.last_name"
        severity: warning
        message: "Last name is required."
      - field: fldya31Cb8IADmmkp
        rule_id: "required_field.students.dob"
        severity: warning
        message: "Date of birth is required."
      - field: fldT66vHCpSWod2uW
        rule_id: "required_field.students.parents_link"
        severity: warning
        message: "Parents record link is required."
  parents:
    description: Parent/guardian contacts linked to students for communication.
    table_id: tblQ7rYJmvuzHZibn
    key_identifiers:
      - parent_id
      - contact_email
      - contact_phone
    identity_fields:
      - full_name
      - contact_email
      - contact_phone
      - mailing_address
    relationships:
      students:
        target: students
        min_links: 1
        require_active: true
        message: "Active parents must link to at least one student."
    missing_key_data:
      - field: fldeIHhrdDVM83sSX
        rule_id: "required_field.parents.first_name"
        severity: warning
        message: "First name is required."
      - field: fldKgMQnaClWfP5wx
        rule_id: "required_field.parents.last_name"
        severity: warning
        message: "Last name is required."
      - field: fld04xn6QzH3sBqGC
        rule_id: "required_field.parents.email"
        severity: warning
        message: "Email is required."
      - field: fldG54G4X7JE0br0o
        rule_id: "required_field.parents.phone"
        severity: warning
        message: "Phone number is required."
      - field: fld6fSfb3IAyHL3tf
        rule_id: "required_field.parents.address_street"
        severity: warning
        message: "Street address is required."
      - field: fldvkauZW6jkGpAUO
        rule_id: "required_field.parents.students_link"
        severity: warning
        message: "Students link is required."
  contractors:
    description: Contractors and instructors who teach classes.
    table_id: tblTKhNj6lJaBn5wb
    key_identifiers:
      - contractor_id
      - email
      - phone
      - ein
    identity_fields:
      - legal_name
      - preferred_name
      - email
      - phone
    relationships: {}
    missing_key_data:
      - field: flddCJDACjAsP1ltS
        rule_id: "required_field.contractors.email"
        severity: warning
        message: "Email is required."
      - field: fldWBnA5Xf6eQATOi
        rule_id: "required_field.contractors.cell_phone"
        severity: warning
        message: "Cell phone is required."
      - field: fldvkUuMlXw8vBvNQ
        rule_id: "required_field.contractors.contractor_vol"
        severity: warning
